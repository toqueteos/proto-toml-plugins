# A TOML plugin for proto:
# https://moonrepo.dev/docs/proto/non-wasm-plugin

name = "dotenvx"
type = "cli"

[resolve]
git-url = "https://github.com/dotenvx/dotenvx"

[install]
download-url = "https://github.com/dotenvx/dotenvx/releases/download/v{version}/{download_file}"
checksum-url = "https://github.com/dotenvx/dotenvx/releases/download/v{version}/{checksum_file}"

[install.arch]
aarch64 = "arm64"
x86_64 = "amd64"

[platform.macos]
download-file = "dotenvx-{version}-darwin-{arch}.tar.gz"
checksum-file = "checksums.txt"

[platform.linux]
download-file = "dotenvx-{version}-linux-{arch}.tar.gz"
checksum-file = "checksums.txt"
